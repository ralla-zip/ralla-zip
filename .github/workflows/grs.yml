name: Update README cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}
            &show_icons=true
            &count_private=true
            &title_color=4A5C3A
            &text_color=5C4035
            &icon_color=8FA678
            &bg_color=FAF5EC
            &border_color=C4A898
            &border_radius=12
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=6
            &title_color=4A5C3A
            &text_color=5C4035
            &bg_color=FAF5EC
            &border_color=C4A898
            &border_radius=12
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card
        run: |
          mkdir -p profile
          curl -s "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&background=FAF5EC&border=C4A898&stroke=DDD3C2&ring=6B7C5A&fire=8FA678&currStreakNum=4A5C3A&sideNums=6B7C5A&currStreakLabel=6B7C5A&sideLabels=A68B74&dates=A68B74&border_radius=12&type=svg" \
            -o profile/streak.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stats cards" || exit 0
          git push
